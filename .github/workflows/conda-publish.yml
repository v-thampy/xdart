name: conda-publish

# Build the noarch conda package with rattler-build and upload it to our
# prefix.dev channel on a version tag — enabling
#   pixi global install -c https://prefix.dev/<channel> -c conda-forge xrd-tools
# See docs/design/plan_conda_package_v1.1_jul2026.md.
#
# One-time setup (maintainer): create the prefix.dev channel, then add repo
# secret  PREFIX_API_KEY  and repo variable  PREFIX_CHANNEL  (the channel name).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}          # manual runs build only (no tag → no version check)

jobs:
  build-and-upload:
    runs-on: ubuntu-latest       # noarch: one build serves every platform
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency (tag == pyproject == recipe)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pyproject=$(grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          recipe=$(grep -m1 '^  version:' recipe/recipe.yaml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$tag  pyproject=$pyproject  recipe=$recipe"
          if [ "$tag" != "$pyproject" ] || [ "$tag" != "$recipe" ]; then
            echo "::error::version mismatch — tag/pyproject/recipe must all agree"
            exit 1
          fi

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          run-install: false

      - name: Build (rattler-build, noarch)
        run: |
          pixi exec rattler-build build \
            --recipe recipe/recipe.yaml \
            --channel conda-forge \
            --output-dir ./output

      - name: Upload to prefix.dev
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
          PREFIX_CHANNEL: ${{ vars.PREFIX_CHANNEL }}
        run: |
          pixi exec rattler-build upload prefix \
            --channel "$PREFIX_CHANNEL" \
            ./output/noarch/*.conda
