name: Release build
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      # Pre-flight (scripts/release.py): tag == pyproject == module
      # versions, dependency ceilings, schema pins + byte-compat gate.
      - run: pip install -e ".[dev]"
      - run: python scripts/release.py check "${GITHUB_REF_NAME}" --strict-tree
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with: {name: dist, path: dist/}
      # No auto-publish: the maintainer uploads manually.
