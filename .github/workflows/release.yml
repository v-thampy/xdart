name: Release build
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      # Pre-flight (scripts/release.py): tag == pyproject == module
      # versions, dependency ceilings, schema pins + byte-compat gate.
      - run: pip install -e ".[dev]"
      - run: python scripts/release.py check "${GITHUB_REF_NAME}" --strict-tree
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with: {name: dist, path: dist/}

  # Publish the dist/ built above to PyPI via OIDC Trusted Publishing (no
  # stored secret) — symmetric with conda-publish.yml, so one
  # `git tag vX.Y.Z && git push origin vX.Y.Z` ships pip + conda together
  # (v1.1.0 never reached PyPI because this step was manual and skipped).
  #
  # One-time setup (maintainer):
  #   1. pypi.org → project 'xdart' → Publishing → add a GitHub publisher:
  #      owner v-thampy, repo xdart, workflow release.yml, environment pypi.
  #   2. GitHub repo → Settings → Environments → create 'pypi' (optionally
  #      restrict to protected tags).
  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/xdart
    permissions:
      id-token: write   # the OIDC token IS the credential (Trusted Publishing)
    steps:
      - uses: actions/download-artifact@v7
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@release/v1
