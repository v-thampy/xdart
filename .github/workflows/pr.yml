name: PR
on:
  pull_request:
  push:
    branches: [main]

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e ".[dev,fitting,rsm]"
      - run: pytest tests/core -q -m "not slow" --timeout=300

  architecture-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e ".[dev]"
      - run: pytest tests/core/test_architecture_guards.py tests/core/test_ssrl_shim.py -q --timeout=120

  xdart-offscreen:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0
      - run: pip install -e ".[gui,dev,fitting,rsm]"
      - env:
          QT_QPA_PLATFORM: offscreen
        # The offscreen pyqtgraph backend intermittently segfaults (exit 139)
        # while constructing PlotItems under repeated widget creation — a Qt/GL
        # teardown flake, not a test failure. Retry ONLY on 139 so a real test
        # failure (any other non-zero) still fails fast and is never masked.
        run: |
          for attempt in 1 2 3; do
            pytest tests/xdart -q --timeout=600 --junitxml="xdart-attempt-$attempt.xml"
            code=$?
            [ "$code" -eq 0 ] && exit 0
            # A real test failure/error must fail fast even when the process ALSO
            # segfaults on teardown (exit 139 masks pytest's exit 1). Trust the
            # JUnit report, not just the exit code.
            if grep -qE '(failures|errors)="[1-9][0-9]*"' "xdart-attempt-$attempt.xml" 2>/dev/null; then
              echo "::error::pytest tests/xdart reported real failures (not a segfault flake)"
              exit 1
            fi
            if [ "$code" -ne 139 ]; then exit "$code"; fi
            echo "::warning::pytest tests/xdart segfaulted (139), no reported failures, on attempt $attempt; retrying"
          done
          exit 139

  # Release-readiness preflight: version pins, the pyFAI ceiling, and the
  # schema/byte-compat gate must stay green on every PR.  No --strict-tree, so an
  # uncommitted tree only warns (a clean CI checkout passes the tree check anyway).
  release-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      # base+dev suffices: `import xdart` resolves without the gui extra, and the
      # schema check's two test files need only io (h5py, pyFAI is a base dep) + pytest.
      - run: pip install -e ".[dev]"
      - run: python scripts/release.py check
