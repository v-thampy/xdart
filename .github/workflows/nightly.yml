name: Nightly
on:
  schedule:
    - cron: "17 9 * * *"   # 09:17 UTC daily
  workflow_dispatch:

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0
      - run: pip install -e ".[gui,dev,fitting,rsm]"
      - run: pytest tests/core -q --timeout=600
      - env:
          QT_QPA_PLATFORM: offscreen
        # Retry ONLY on the offscreen-pyqtgraph segfault (exit 139); any real
        # test failure still fails fast (see pr.yml for the rationale).
        run: |
          for attempt in 1 2 3; do
            pytest tests/xdart -q --timeout=900 --junitxml="xdart-attempt-$attempt.xml"
            code=$?
            [ "$code" -eq 0 ] && exit 0
            # A real test failure/error must fail fast even when the process ALSO
            # segfaults on teardown (exit 139 masks pytest's exit 1) -- Nightly #18
            # burned all three retries on a genuine failure that segfaulted after.
            # Trust the JUnit report, not just the exit code.
            if grep -qE '(failures|errors)="[1-9][0-9]*"' "xdart-attempt-$attempt.xml" 2>/dev/null; then
              echo "::error::pytest tests/xdart reported real failures (not a segfault flake)"
              exit 1
            fi
            if [ "$code" -ne 139 ]; then exit "$code"; fi
            echo "::warning::pytest tests/xdart segfaulted (139), no reported failures, on attempt $attempt; retrying"
          done
          exit 139
      # The GI live==batch==reload equivalence spine needs the real
      # detector test data; runs on self-hosted/local checkouts where
      # XDART_TEST_DATA points at it.  Kept here as a reminder job step:
      # the data is not in the repo, so CI skips it by design.
