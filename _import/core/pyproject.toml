[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "ssrl_xrd_tools"
version = "0.1.0"
description = "SSRL X-ray diffraction data processing and visualization tools"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "h5py",
    "fabio",
    "silx",
    "pyFAI",
    "xrayutilities",
    "joblib",
    "natsort",
    "lmfit",
]

[project.optional-dependencies]
gui = [
    "panel",
    "holoviews",
    "bokeh",
    "napari",
]
vtk = ["pyevtk"]
dev = [
    "jupyterlab",
    "matplotlib",
    "pytest",
    "ipykernel",
    "ipywidgets",
]

[project.scripts]
xdart = "ssrl_xrd_tools.gui.main:main"

[tool.setuptools.packages.find]
where = ["."]
