[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "ssrl_xrd_tools"
version = "0.1.0"
description = "SSRL X-ray diffraction data processing and visualization tools"
requires-python = ">=3.12"
dependencies = [
    "numpy",
    "scipy",
    "h5py",
    "fabio",
    "silx",
    "pyFAI",
    "xrayutilities",
    "joblib",
    "natsort",
    "lmfit",
]

[project.optional-dependencies]
gui = [
    "panel",
    "holoviews",
    "bokeh",
    "napari",
]
tiled = ["tiled[client]"]
vtk = ["pyevtk"]
dev = [
    "jupyterlab",
    "matplotlib",
    "pytest",
    "ipykernel",
    "ipywidgets",
]

[project.scripts]
xdart = "ssrl_xrd_tools.gui.main:main"

[tool.setuptools.packages.find]
where = ["."]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
markers = [
    "slow: tests that use full-size detector images or expensive integrations",
]
